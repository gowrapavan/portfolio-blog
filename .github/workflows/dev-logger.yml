name: Agentic Dev Logger

on:
  push:
    branches:
      - main

jobs:
  generate-log:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # NEW: This caches your dependencies so it's faster next time
          cache: 'npm'

      # NEW: This installs @supabase/supabase-js on the GitHub runner
      - name: Install dependencies
        run: npm install

      - name: Get Git Diff
        id: git-diff
        run: |
          DIFF=$(git diff HEAD^ HEAD -- . ':(exclude)package-lock.json' ':(exclude)yarn.lock')
          echo "diff<<EOF" >> $GITHUB_ENV
          echo "$DIFF" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Run AI Logger Script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GIT_DIFF: ${{ env.diff }}
        run: node scripts/generate-log.js