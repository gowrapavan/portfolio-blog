<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arsenal vs Bournemouth | Live</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: #fff; font-family: sans-serif; }
        .video-container { width: 90%; max-width: 800px; border: 2px solid #333; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        video { width: 100%; display: block; }
        h1 { margin-bottom: 20px; font-weight: 300; }
    </style>
</head>
<body>

    <h1>Arsenal vs Bournemouth</h1>

    <div class="video-container">
        <video id="video" controls></video>
    </div>

    <script>
        const video = document.getElementById('video');
        // This is the direct link you found in the Network tab
        const streamUrl = 'https://streaming.cdnx-sportnobar.xyz/live/sd-6MuT7JxzsCedndMwau.m3u8';

        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play();
            });
        } 
        // For Safari which supports HLS natively
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = streamUrl;
            video.addEventListener('loadedmetadata', function() {
                video.play();
            });
        }
    </script>
</body>
</html>
